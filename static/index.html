<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="toolbar">
        <div>
          <h1 data-i18n="app.title"></h1>
          <div class="db-row">
            <p id="dbPath"></p>
            <button id="selectDbBtn" type="button" data-i18n="button.selectDatabase"></button>
          </div>
        </div>
        <div class="toolbar-actions">
          <label class="language-control">
            <span data-i18n="language.label"></span>
            <select id="languageSelect">
              <option value="zh-CN" data-i18n="language.zhCN"></option>
              <option value="en-US" data-i18n="language.enUS"></option>
            </select>
          </label>
          <button id="refreshBtn" type="button" data-i18n-title="button.refreshTitle">↻</button>
        </div>
      </header>

      <section class="controls">
        <label>
          <span data-i18n="label.search"></span>
          <input id="searchInput" type="search" data-i18n-placeholder="placeholder.search" />
        </label>
        <label id="providerControl">
          <span><span data-i18n="label.providerOwner"></span><span class="label-note" data-i18n="note.providerOwner"></span></span>
          <input id="providerInput" type="text" value="openai" list="providerList" placeholder="openai / custom" />
          <datalist id="providerList">
            <option value="openai"></option>
            <option value="custom"></option>
          </datalist>
        </label>
        <button id="applyBtn" type="button" data-i18n="button.applySelected"></button>
      </section>

      <section class="message-row">
        <section id="message" class="message" aria-live="polite"></section>
        <div id="backupActions" class="backup-actions">
          <button id="openBackupBtn" type="button" data-i18n="button.openBackup"></button>
          <button id="keepBackupsBtn" type="button" data-i18n="button.keepBackups"></button>
          <button id="clearBackupsBtn" type="button" class="danger-button" data-i18n="button.clearBackups"></button>
        </div>
      </section>

      <section class="table-wrap">
        <table id="threadTable">
          <colgroup>
            <col class="check-col" />
            <col data-column="title" />
            <col data-column="model_provider" />
            <col data-column="rollout_provider" />
            <col data-column="tokens_used" />
            <col data-column="updated_at" />
            <col data-column="cwd" />
            <col data-column="rollout_path" />
            <col data-column="rollout_actions" />
          </colgroup>
          <thead>
            <tr>
              <th><input id="selectAll" type="checkbox" /></th>
              <th data-resizable="title" data-i18n="table.title"></th>
              <th data-resizable="model_provider" data-i18n="table.projectOwner"></th>
              <th data-resizable="rollout_provider" data-i18n="table.recordOwner"></th>
              <th data-resizable="tokens_used" data-i18n="table.tokensUsed"></th>
              <th data-resizable="updated_at" data-i18n="table.updatedAt"></th>
              <th data-resizable="cwd" data-i18n="table.workspace"></th>
              <th data-resizable="rollout_path" data-i18n="table.recordPath"></th>
              <th data-resizable="rollout_actions" data-i18n="table.fileActions"></th>
            </tr>
          </thead>
          <tbody id="threadBody"></tbody>
        </table>
      </section>
      <section class="pagination-bar" data-i18n-aria-label="pagination.ariaLabel">
        <label>
          <span data-i18n="pagination.pageSize"></span>
          <select id="pageSizeSelect">
            <option value="5" selected data-i18n="pagination.option5"></option>
            <option value="10" data-i18n="pagination.option10"></option>
            <option value="20" data-i18n="pagination.option20"></option>
          </select>
        </label>
        <!--<span id="pageStatus"></span>-->
        <div class="pagination-actions">
          <button id="prevPageBtn" type="button" data-i18n="pagination.prev"></button>
          <button id="nextPageBtn" type="button" data-i18n="pagination.next"></button>
        </div>
      </section>

      <dialog id="rolloutDialog">
        <form method="dialog" class="dialog-body">
          <header class="dialog-header">
            <div>
              <h2 data-i18n="dialog.rolloutTitle"></h2>
              <p id="editorThreadId"></p>
            </div>
            <button id="closeEditorBtn" type="button" data-i18n-title="button.closeTitle">×</button>
          </header>
          <label class="path-editor">
            <span data-i18n="label.filePath"></span>
            <input id="rolloutPathInput" type="text" readonly />
          </label>
          <div class="dialog-actions">
            <div class="dialog-action-group">
              <button id="selectPathBtn" type="button" data-i18n="button.selectFile"></button>
              <a id="rawLink" target="_blank" rel="noreferrer" data-i18n="button.openInBrowser"></a>
            </div>
            <div class="dialog-action-group">
              <span id="matchStatus" class="match-status"></span>
              <label class="inline-toggle">
                <input id="wrapToggle" type="checkbox" checked />
                <span data-i18n="label.wrapLines"></span>
              </label>
              <button id="locateMatchBtn" type="button" data-i18n="button.locate"></button>
            </div>
          </div>
          <section id="rolloutPreviewNotice" class="preview-notice" data-i18n="notice.rolloutPreview"></section>
          <div id="editorWrap" class="editor-wrap wrap-lines">
            <pre id="highlightLayer" aria-hidden="true"></pre>
            <textarea id="rolloutEditor" spellcheck="false" wrap="soft" readonly></textarea>
          </div>
        </form>
      </dialog>

      <dialog id="clearBackupDialog" class="confirm-dialog">
        <form method="dialog" class="confirm-body">
          <header class="dialog-header">
            <div>
              <h2 data-i18n="dialog.clearBackupsTitle"></h2>
            </div>
            <button id="closeClearDialogBtn" type="button" data-i18n-title="button.closeTitle">×</button>
          </header>
          <label>
            <span data-i18n="label.confirmText"></span>
            <input id="clearConfirmInput" type="text" autocomplete="off" />
          </label>
          <p class="confirm-note" data-i18n="note.clearBackups"></p>
          <div class="confirm-actions">
            <button id="cancelClearBtn" type="button" data-i18n="button.cancel"></button>
            <button id="confirmClearBtn" type="button" class="danger-button" data-i18n="button.confirmClear"></button>
          </div>
        </form>
      </dialog>

      <dialog id="deleteArchivedDialog" class="confirm-dialog">
        <form method="dialog" class="confirm-body">
          <header class="dialog-header">
            <div>
              <h2 data-i18n="dialog.deleteArchivedTitle"></h2>
            </div>
            <button id="closeDeleteArchivedDialogBtn" type="button" data-i18n-title="button.closeTitle">×</button>
          </header>
          <label>
            <span data-i18n="label.confirmText"></span>
            <input id="deleteArchivedConfirmInput" type="text" autocomplete="off" />
          </label>
          <p class="confirm-note" data-i18n="note.deleteArchived"></p>
          <div class="confirm-actions">
            <button id="cancelDeleteArchivedBtn" type="button" data-i18n="button.cancel"></button>
            <button id="confirmDeleteArchivedBtn" type="button" class="danger-button" data-i18n="button.confirmDelete"></button>
          </div>
        </form>
      </dialog>

      <dialog id="titleDialog" class="confirm-dialog">
        <form method="dialog" class="confirm-body">
          <header class="dialog-header">
            <div>
              <h2 data-i18n="dialog.fullTitle"></h2>
            </div>
            <button id="closeTitleDialogBtn" type="button" data-i18n-title="button.closeTitle">×</button>
          </header>
          <p id="fullTitleText" class="full-title"></p>
        </form>
      </dialog>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
